<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ink It ✦</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;color:#ccc;font-family:monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#topbar{
  display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:#1a1a1a;border-bottom:1px solid #333;flex-shrink:0;
  flex-wrap:wrap;
}
#topbar h1{font-size:14px;color:#f0c040;letter-spacing:2px;margin-right:6px;}
.sym-btn{
  background:#222;border:1px solid #444;color:#aaa;
  padding:4px 10px;font-size:11px;cursor:pointer;border-radius:2px;font-family:monospace;
}
.sym-btn.active{background:#3a2800;border-color:#f0c040;color:#f0c040;}
.sym-btn:hover{background:#2a2a2a;}
.sep{width:1px;height:20px;background:#333;margin:0 4px;}
.act-btn{
  background:#2a2a2a;border:1px solid #555;color:#ccc;
  padding:4px 12px;font-size:11px;cursor:pointer;border-radius:2px;font-family:monospace;
}
.act-btn:hover{background:#3a3a3a;}
#btn-generate{border-color:#f0c040;color:#f0c040;}
#main{display:flex;flex:1;overflow:hidden;}
#left{
  width:50%;display:flex;flex-direction:column;
  border-right:1px solid #333;
}
#draw-canvas{flex:1;cursor:crosshair;display:block;background:#111;}
#controls{
  padding:10px 14px;background:#1a1a1a;border-top:1px solid #333;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
}
.ctrl{display:flex;align-items:center;gap:6px;font-size:11px;color:#888;}
.ctrl label{white-space:nowrap;}
.ctrl span{color:#f0c040;min-width:28px;text-align:right;}
input[type=range]{width:80px;accent-color:#f0c040;}
input[type=color]{width:26px;height:20px;border:none;background:none;cursor:pointer;padding:0;}
#right{width:50%;position:relative;}
#three-canvas{display:block;width:100%;height:100%;}
#hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#333;font-size:12px;text-align:center;pointer-events:none;
}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="topbar">
  <h1>Ink It ✦</h1>
  <div style="display:flex;gap:4px;">
    <button class="sym-btn" data-sym="free">Free</button>
    <button class="sym-btn active" data-sym="2">2</button>
    <button class="sym-btn" data-sym="4">4</button>
    <button class="sym-btn" data-sym="6">6</button>
    <button class="sym-btn" data-sym="8">8</button>
    <button class="sym-btn" data-sym="mirror">Mirror</button>
  </div>
  <div class="sep"></div>
  <div style="display:flex;gap:4px;">
    <button class="sym-btn active" data-mat="chrome">Chrome</button>
    <button class="sym-btn" data-mat="matte">Matte</button>
    <button class="sym-btn" data-mat="gold">Gold</button>
  </div>
  <div class="sep"></div>
  <button class="act-btn" id="btn-clear">Clear</button>
  <button class="act-btn" id="btn-generate">Generate 3D</button>
  <button class="act-btn" id="btn-export">Export PNG</button>
  <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:4px;">
    <input type="checkbox" id="bloom-toggle" checked/> Bloom
  </label>
</div>

<div id="main">
  <div id="left">
    <canvas id="draw-canvas"></canvas>
    <div id="controls">
      <div class="ctrl">
        <label>Brush</label>
        <input type="range" id="brush-size" min="2" max="30" value="8"/>
        <span id="brush-val">8</span>
      </div>
      <div class="ctrl">
        <label>Turbulence</label>
        <input type="range" id="turbulence" min="0" max="20" value="5"/>
        <span id="turb-val">5</span>
      </div>
      <div class="ctrl">
        <label>Tube r</label>
        <input type="range" id="tube-radius" min="1" max="50" value="15"/>
        <span id="tube-val">0.015</span>
      </div>
      <div class="ctrl">
        <label>Color</label>
        <input type="color" id="stroke-color" value="#c8a020"/>
      </div>
    </div>
  </div>
  <div id="right">
    <canvas id="three-canvas"></canvas>
    <div id="hint">Draw on the left →<br/>then Generate 3D</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── STATE ────────────────────────────────────────────────────────────────────
let symmetry = 2;
let currentMat = 'chrome';
let strokes = [];       // completed strokes: [{pts:[{x,y,w}]}]
let currentStroke = []; // points being drawn
let isDrawing = false;
let lastX = 0, lastY = 0, lastT = 0;
let autoGenTimer = null;
let poolTimer = null;   // ink pooling timer when mouse is still
let poolW = 0;          // current pooling width

// ─── DRAWING CANVAS ───────────────────────────────────────────────────────────
const drawCanvas = document.getElementById('draw-canvas');
const dc = drawCanvas.getContext('2d');

function resizeDrawCanvas() {
  const rect = drawCanvas.parentElement.getBoundingClientRect();
  const ctrls = document.getElementById('controls');
  drawCanvas.width = rect.width;
  drawCanvas.height = rect.height - ctrls.offsetHeight;
  redrawAll();
}

// Simple noise for turbulence
function noise(x, y) {
  const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return (n - Math.floor(n)) * 2 - 1;
}

function applyTurbulence(pts) {
  const t = parseFloat(document.getElementById('turbulence').value);
  if (t === 0) return pts;
  return pts.map((p, i) => ({
    x: p.x + noise(p.x * 0.05, i * 0.3) * t,
    y: p.y + noise(i * 0.3, p.y * 0.05) * t,
    w: p.w
  }));
}

function getSymmetryPoints(pts) {
  if (!pts.length) return [];
  const cx = drawCanvas.width / 2;
  const cy = drawCanvas.height / 2;
  const copies = [];

  if (symmetry === 'mirror') {
    copies.push(pts);
    copies.push(pts.map(p => ({ x: cx * 2 - p.x, y: p.y, w: p.w })));
  } else if (symmetry === 'free') {
    copies.push(pts);
  } else {
    const n = parseInt(symmetry);
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i) / n;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      copies.push(pts.map(p => {
        const dx = p.x - cx, dy = p.y - cy;
        return { x: cx + dx * cos - dy * sin, y: cy + dx * sin + dy * cos, w: p.w };
      }));
    }
  }
  return copies;
}

function drawStroke(pts, alpha) {
  if (pts.length < 2) return;
  const color = document.getElementById('stroke-color').value;
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);

  dc.globalAlpha = alpha;
  dc.lineCap = 'round';
  dc.lineJoin = 'round';
  dc.strokeStyle = `rgb(${r},${g},${b})`;
  dc.beginPath();
  dc.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    dc.lineWidth = pts[i].w;
    dc.lineTo(pts[i].x, pts[i].y);
  }
  dc.stroke();
  dc.globalAlpha = 1;
}

function redrawAll() {
  dc.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  // Completed strokes
  for (const stroke of strokes) {
    for (const copy of getSymmetryPoints(applyTurbulence(stroke.pts))) {
      drawStroke(copy, 1.0);
    }
  }
  // Current stroke (ghost)
  if (currentStroke.length > 1) {
    for (const copy of getSymmetryPoints(currentStroke)) {
      drawStroke(copy, 0.7);
    }
  }
}

function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  clearTimeout(poolTimer);
  isDrawing = true;
  const pos = getPos(e);
  lastX = pos.x; lastY = pos.y; lastT = Date.now();
  const bs = parseFloat(document.getElementById('brush-size').value);
  poolW = bs;
  currentStroke = [{ x: pos.x, y: pos.y, w: bs }];
}

function startPool(x, y) {
  // Ink pools when mouse is still — grow width over time
  clearTimeout(poolTimer);
  const bs = parseFloat(document.getElementById('brush-size').value);
  const maxPool = bs * 4;
  function grow() {
    if (!isDrawing) return;
    poolW = Math.min(poolW + bs * 0.12, maxPool);
    currentStroke.push({ x, y, w: poolW });
    redrawAll();
    poolTimer = setTimeout(grow, 40);
  }
  poolTimer = setTimeout(grow, 120); // start pooling after 120ms still
}

function moveDraw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  const now = Date.now();
  const dt = Math.max(1, now - lastT);
  const dist = Math.hypot(pos.x - lastX, pos.y - lastY);

  if (dist < 1.5) {
    // Mouse nearly still — start pooling
    startPool(pos.x, pos.y);
    return;
  }
  clearTimeout(poolTimer);

  const speed = dist / dt; // px/ms
  const bs = parseFloat(document.getElementById('brush-size').value);

  // Speed → width: fast=thin, slow=thick, with smooth easing
  const targetW = Math.max(1.5, bs * (1.2 - Math.min(speed * 0.2, 1.0)));
  // Lerp current poolW toward targetW for smooth transitions
  poolW = poolW * 0.6 + targetW * 0.4;

  currentStroke.push({ x: pos.x, y: pos.y, w: poolW });
  lastX = pos.x; lastY = pos.y; lastT = now;
  redrawAll();
}

function endDraw(e) {
  if (!isDrawing) return;
  clearTimeout(poolTimer);
  isDrawing = false;
  if (currentStroke.length > 1) {
    // Taper end of stroke
    const last = currentStroke[currentStroke.length - 1];
    currentStroke.push({ x: last.x, y: last.y, w: Math.max(0.5, last.w * 0.3) });
    strokes.push({ pts: applyTurbulence(currentStroke) });
    currentStroke = [];
    redrawAll();
    // Auto-generate 3D after 600ms
    clearTimeout(autoGenTimer);
    autoGenTimer = setTimeout(build3D, 600);
  }
}

drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', moveDraw);
drawCanvas.addEventListener('mouseup', endDraw);
drawCanvas.addEventListener('mouseleave', endDraw);
drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
drawCanvas.addEventListener('touchmove', moveDraw, { passive: false });
drawCanvas.addEventListener('touchend', endDraw);

// ─── THREE.JS SETUP ───────────────────────────────────────────────────────────
const threeCanvas = document.getElementById('three-canvas');
const rightEl = document.getElementById('right');

const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0d0d0d');

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
camera.position.set(0, 2, 5);

const controls = new OrbitControls(camera, threeCanvas);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;

// Environment
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// Post-processing
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(new THREE.Vector2(800, 600), 0.5, 0.4, 0.7);
bloomPass.enabled = true;
composer.addPass(bloomPass);

const outputPass = new OutputPass();
composer.addPass(outputPass);

function resizeThree() {
  const w = rightEl.clientWidth, h = rightEl.clientHeight;
  if (!w || !h) return;
  renderer.setSize(w, h);
  composer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  bloomPass.resolution.set(w, h);
}

// ─── 3D BUILD ─────────────────────────────────────────────────────────────────
let sculpture = null;

function build3D() {
  document.getElementById('hint').style.display = 'none';

  // Clear old sculpture
  if (sculpture) {
    scene.remove(sculpture);
    sculpture.traverse(c => { c.geometry?.dispose(); c.material?.dispose(); });
    sculpture = null;
  }
  if (!strokes.length) return;

  const group = new THREE.Group();
  const color = new THREE.Color(document.getElementById('stroke-color').value);
  const tubeR = parseFloat(document.getElementById('tube-radius').value) / 1000;

  // Canvas dimensions for normalization
  const cw = drawCanvas.width, ch = drawCanvas.height;
  const scale = 3.0 / Math.max(cw, ch);

  // Build symmetry copies
  const symCopies = [];
  if (symmetry === 'free') {
    symCopies.push({ angle: 0, mirror: false });
  } else if (symmetry === 'mirror') {
    symCopies.push({ angle: 0, mirror: false });
    symCopies.push({ angle: 0, mirror: true });
  } else {
    const n = parseInt(symmetry);
    for (let i = 0; i < n; i++) {
      symCopies.push({ angle: (Math.PI * 2 * i) / n, mirror: false });
    }
  }

  for (const stroke of strokes) {
    const pts = stroke.pts;
    if (pts.length < 3) continue;

    // Normalize to [-1.5, 1.5] world space
    const worldPts = pts.map(p => new THREE.Vector3(
      (p.x - cw / 2) * scale,
      -(p.y - ch / 2) * scale,
      0
    ));

    for (const copy of symCopies) {
      let copyPts = worldPts;
      if (copy.mirror) {
        copyPts = worldPts.map(p => new THREE.Vector3(-p.x, p.y, p.z));
      }

      const curve = new THREE.CatmullRomCurve3(copyPts);
      const tubeGeo = new THREE.TubeGeometry(curve, Math.max(20, pts.length), tubeR, 12, false);
      const matParams = {
        chrome: { metalness: 1.0, roughness: 0.0,  envMapIntensity: 2.0 },
        matte:  { metalness: 0.0, roughness: 0.85, envMapIntensity: 0.3 },
        gold:   { metalness: 1.0, roughness: 0.15, envMapIntensity: 1.5 },
      }[currentMat] || { metalness: 0.9, roughness: 0.1 };
      const tubeMat = new THREE.MeshStandardMaterial({
        color,
        ...matParams,
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);

      if (copy.angle !== 0) {
        tube.rotation.y = copy.angle;
      }
      group.add(tube);
    }
  }

  sculpture = group;
  scene.add(sculpture);

  // Frame camera to fit sculpture
  const bbox = new THREE.Box3().setFromObject(sculpture);
  const sphere = new THREE.Sphere();
  bbox.getBoundingSphere(sphere);
  controls.target.copy(sphere.center);
  camera.position.copy(sphere.center).addScaledVector(new THREE.Vector3(0.5, 0.8, 1).normalize(), sphere.radius * 3.5);
  camera.updateProjectionMatrix();
  controls.update();
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  if (bloomPass.enabled) {
    composer.render();
  } else {
    renderer.render(scene, camera);
  }
}
animate();

// ─── CONTROLS ────────────────────────────────────────────────────────────────
document.querySelectorAll('.sym-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.sym;
    symmetry = (v === 'free' || v === 'mirror') ? v : parseInt(v);
    redrawAll();
  });
});

document.getElementById('btn-clear').addEventListener('click', () => {
  strokes = []; currentStroke = [];
  dc.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  if (sculpture) { scene.remove(sculpture); sculpture = null; }
  document.getElementById('hint').style.display = '';
});

document.getElementById('btn-generate').addEventListener('click', build3D);

document.getElementById('bloom-toggle').addEventListener('change', e => {
  bloomPass.enabled = e.target.checked;
});

// Material buttons
document.querySelectorAll('[data-mat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMat = btn.dataset.mat;
    // Chrome: auto bloom on + high exposure; Matte: bloom off
    if (currentMat === 'chrome') {
      bloomPass.enabled = true;
      document.getElementById('bloom-toggle').checked = true;
      renderer.toneMappingExposure = 1.5;
    } else if (currentMat === 'matte') {
      bloomPass.enabled = true;
      document.getElementById('bloom-toggle').checked = false;
      renderer.toneMappingExposure = 1.0;
    } else {
      bloomPass.enabled = true;
      document.getElementById('bloom-toggle').checked = true;
      renderer.toneMappingExposure = 1.2;
    }
    if (sculpture) build3D(); // rebuild with new material
  });
});

// Slider bindings
function bindSlider(id, valId, factor, digits) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    vl.textContent = factor ? (v * factor).toFixed(digits) : v;
  });
}
bindSlider('brush-size', 'brush-val', 0, 0);
bindSlider('turbulence', 'turb-val', 0, 0);
bindSlider('tube-radius', 'tube-val', 0.001, 3);

// Export
document.getElementById('btn-export').addEventListener('click', () => {
  renderer.render(scene, camera);
  threeCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'inkit.png';
    a.click();
    URL.revokeObjectURL(a.href);
  });
});

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function onResize() {
  resizeDrawCanvas();
  resizeThree();
}
window.addEventListener('resize', onResize);

// Init
requestAnimationFrame(() => {
  onResize();
});
</script>
</body>
</html>
