<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ink It ✦</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;color:#ccc;font-family:monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#topbar{
  display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:#1a1a1a;border-bottom:1px solid #333;flex-shrink:0;
  flex-wrap:wrap;
}
#topbar h1{font-size:14px;color:#f0c040;letter-spacing:2px;margin-right:6px;}
.sym-btn{
  background:#222;border:1px solid #444;color:#aaa;
  padding:4px 10px;font-size:11px;cursor:pointer;border-radius:2px;font-family:monospace;
}
.sym-btn.active{background:#3a2800;border-color:#f0c040;color:#f0c040;}
.sym-btn:hover{background:#2a2a2a;}
.mat-btn{
  background:#1a1a1a;border:1px solid #444;color:#aaa;
  padding:5px 12px;font-size:10px;cursor:pointer;border-radius:2px;font-family:monospace;
}
.mat-btn.active{background:#2a2a00;border-color:#f0c040;color:#f0c040;}
.mat-btn:hover{background:#2a2a2a;}
.sep{width:1px;height:20px;background:#333;margin:0 4px;}
.act-btn{
  background:#2a2a2a;border:1px solid #555;color:#ccc;
  padding:4px 12px;font-size:11px;cursor:pointer;border-radius:2px;font-family:monospace;
}
.act-btn:hover{background:#3a3a3a;}
#btn-generate{border-color:#f0c040;color:#f0c040;}
#main{display:flex;flex:1;overflow:hidden;}
#left{
  width:50%;display:flex;flex-direction:column;
  border-right:1px solid #333;
}
#draw-canvas{flex:1;cursor:crosshair;display:block;background:#111;}
#controls{
  padding:10px 14px;background:#1a1a1a;border-top:1px solid #333;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
}
.ctrl{display:flex;align-items:center;gap:6px;font-size:11px;color:#888;}
.ctrl label{white-space:nowrap;}
.ctrl span{color:#f0c040;min-width:28px;text-align:right;}
input[type=range]{width:80px;accent-color:#f0c040;}
input[type=color]{width:26px;height:20px;border:none;background:none;cursor:pointer;padding:0;}
#right{width:50%;position:relative;}
#three-canvas{display:block;width:100%;height:100%;}
#mat-panel{
  position:absolute;top:12px;right:12px;
  display:flex;gap:6px;padding:6px;
  background:rgba(26,26,26,0.85);border:1px solid #333;border-radius:3px;
  backdrop-filter:blur(4px);
}
#hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#333;font-size:12px;text-align:center;pointer-events:none;
}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}

<body>

<div id="topbar">
  <h1>Ink It ✦</h1>
  <div style="display:flex;gap:4px;">
    <button class="sym-btn" data-sym="free">Free</button>
    <button class="sym-btn active" data-sym="2">2</button>
    <button class="sym-btn" data-sym="4">4</button>
    <button class="sym-btn" data-sym="6">6</button>
    <button class="sym-btn" data-sym="8">8</button>
    <button class="sym-btn" data-sym="mirror">Mirror</button>
  </div>
  <div class="sep"></div>
  <button class="act-btn" id="btn-clear">Clear</button>
  <button class="act-btn" id="btn-generate">Generate 3D</button>
  <button class="act-btn" id="btn-render" style="border-color:#80d0ff;color:#80d0ff;">Render HD</button>
  <button class="act-btn" id="btn-export">Export PNG</button>

  <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:4px;">

    <input type="file" id="ref-img-input" accept="image/*" style="display:none"/>
  </label>
  <div class="sep"></div>
  <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:4px;">
    <input type="radio" name="draw-mode" id="mode-brush" checked/> Brush
  </label>
  <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:4px;">

  </label>
  <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:4px;">

  <label style="font-size:11px;color:#888;display:flex;align-items:center;gap:4px;">

</div>

<div id="main">
  <div id="left">
    <canvas id="draw-canvas"></canvas>
    <div id="controls">
      <div class="ctrl">
        <label>Brush</label>
        <input type="range" id="brush-size" min="2" max="30" value="8"/>
        <span id="brush-val">8</span>
      </div>
      <div class="ctrl">
        <label>Turbulence</label>
        <input type="range" id="turbulence" min="0" max="20" value="2"/>
        <span id="turb-val">2</span>
      </div>
      <div class="ctrl">
        <label>Tube r</label>
        <input type="range" id="tube-radius" min="1" max="50" value="15"/>
        <span id="tube-val">0.015</span>
      </div>
      <div class="ctrl">
        <label>Z Spread</label>
        <input type="range" id="z-spread" min="0" max="100" value="0"/>

      </div>
      <div class="ctrl">
        <label>Smooth</label>
        <input type="range" id="smooth" min="0" max="5" value="1"/>

      <div class="ctrl">
        <label>Strength</label>
        <input type="range" id="strength" min="1" max="100" value="6"/>

      </div>

        <label>Color</label>
        <input type="color" id="stroke-color" value="#c8a020"/>

  </div>
  <div id="right">
    <canvas id="three-canvas"></canvas>
    <div id="mat-panel">
      <button class="mat-btn active" data-mat="chrome">Chrome</button>
      <button class="mat-btn" data-mat="matte">Matte</button>
      <button class="mat-btn" data-mat="gold">Gold</button>
    </div>
    <div id="hint">Draw on the left →<br/>then Generate 3D</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { MarchingCubes } from 'three/addons/objects/MarchingCubes.js';

// ─── STATE ────────────────────────────────────────────────────────────────────
let symmetry = 2;
let currentMat = 'chrome';
let strokes = [];       // completed strokes: [{pts:[{x,y,w}]}]
let currentStroke = []; // points being drawn
let isDrawing = false;
let lastX = 0, lastY = 0, lastT = 0;
let autoGenTimer = null;
let poolTimer = null;   // ink pooling timer when mouse is still
let poolW = 0;          // current pooling width
let drawMode = 'brush'; // 'brush' | 'pen'
let penAnchors = [];    // [{x,y,cpIn:{x,y},cpOut:{x,y}}]
let penDragging = null; // null | {type:'cp'|'anchor'|'w', idx, which:'in'|'out', startY, startW}
let penPreview = null;  // current mouse pos for preview segment

// ─── DRAWING CANVAS ───────────────────────────────────────────────────────────
const drawCanvas = document.getElementById('draw-canvas');
const dc = drawCanvas.getContext('2d');

function resizeDrawCanvas() {
  const rect = drawCanvas.parentElement.getBoundingClientRect();
  const ctrls = document.getElementById('controls');
  drawCanvas.width = rect.width;
  drawCanvas.height = rect.height - ctrls.offsetHeight;
  redrawAll();
}

// Simple noise for turbulence
function noise(x, y) {
  const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return (n - Math.floor(n)) * 2 - 1;
}

function applyTurbulence(pts) {
  const t = parseFloat(document.getElementById('turbulence').value);
  if (t === 0) return pts;
  return pts.map((p, i) => ({
    x: p.x + noise(p.x * 0.05, i * 0.3) * t,
    y: p.y + noise(i * 0.3, p.y * 0.05) * t,
    w: p.w
  }));
}

function getSymmetryPoints(pts) {
  if (!pts.length) return [];
  const cx = drawCanvas.width / 2;
  const cy = drawCanvas.height / 2;
  const copies = [];

  if (symmetry === 'mirror') {
    copies.push(pts);
    copies.push(pts.map(p => ({ x: cx * 2 - p.x, y: p.y, w: p.w })));
  } else if (symmetry === 'free') {
    copies.push(pts);
  } else {
    const n = parseInt(symmetry);
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i) / n;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      copies.push(pts.map(p => {
        const dx = p.x - cx, dy = p.y - cy;
        return { x: cx + dx * cos - dy * sin, y: cy + dx * sin + dy * cos, w: p.w };
      }));
    }
  }
  return copies;
}

function drawStroke(pts, alpha) {
  if (pts.length < 2) return;
  const color = document.getElementById('stroke-color').value;
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);

  dc.globalAlpha = alpha;
  dc.lineCap = 'round';
  dc.lineJoin = 'round';
  dc.strokeStyle = `rgb(${r},${g},${b})`;
  // Draw each segment separately so lineWidth varies per point
  for (let i = 1; i < pts.length; i++) {
    dc.beginPath();
    dc.lineWidth = pts[i].w;
    dc.moveTo(pts[i-1].x, pts[i-1].y);
    dc.lineTo(pts[i].x, pts[i].y);
    dc.stroke();
  }
  dc.globalAlpha = 1;
}

function draw2DGrid() {
  const step = 40;
  dc.strokeStyle = '#222';
  dc.lineWidth = 0.5;
  dc.globalAlpha = 1;
  for (let x = 0; x < drawCanvas.width; x += step) {
    dc.beginPath(); dc.moveTo(x, 0); dc.lineTo(x, drawCanvas.height); dc.stroke();
  }
  for (let y = 0; y < drawCanvas.height; y += step) {
    dc.beginPath(); dc.moveTo(0, y); dc.lineTo(drawCanvas.width, y); dc.stroke();
  }
}

function redrawAll() {
  dc.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  // Reference image underlay
  if (refImg) {
    dc.save();
    dc.globalAlpha = 0.35;
    dc.drawImage(refImg, 0, 0, drawCanvas.width, drawCanvas.height);
    dc.restore();
  }
  if (document.getElementById('grid-toggle')?.checked) draw2DGrid();
  // Completed strokes
  for (const stroke of strokes) {
    for (const copy of getSymmetryPoints(applyTurbulence(stroke.pts))) {
      drawStroke(copy, 1.0);
    }
  }
  // Current stroke (ghost)
  if (currentStroke.length > 1) {
    for (const copy of getSymmetryPoints(currentStroke)) {
      drawStroke(copy, 0.7);
    }
  }
  drawPenOverlay();
}

function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  clearTimeout(poolTimer);
  isDrawing = true;
  const pos = getPos(e);
  lastX = pos.x; lastY = pos.y; lastT = Date.now();
  const bs = parseFloat(document.getElementById('brush-size').value);
  poolW = bs;
  currentStroke = [{ x: pos.x, y: pos.y, w: bs }];
}

function moveDraw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  const now = Date.now();
  const dt = Math.max(1, now - lastT);
  const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
  const speed = dist / dt; // px/ms

  const bs = parseFloat(document.getElementById('brush-size').value);

  // If nearly still (very slow movement), start pooling
  if (speed < 0.3) {
    clearTimeout(poolTimer);
    const maxPool = bs * 10; // much larger pools
    function grow() {
      if (!isDrawing) return;
      poolW = Math.min(poolW + bs * 0.3, maxPool);
      currentStroke.push({ x: pos.x, y: pos.y, w: poolW });
      redrawAll();
      poolTimer = setTimeout(grow, 30);
    }
    poolTimer = setTimeout(grow, 60);
    lastX = pos.x; lastY = pos.y; lastT = now;
    return;
  }

  // Normal movement — stop pooling, width follows speed (fast=very thin)
  clearTimeout(poolTimer);
  const minW = bs * 0.15; // very thin when fast
  const targetW = Math.max(minW, bs * (1.5 - Math.min(speed * 0.4, 1.3)));
  poolW = bs * 0.5 + targetW * 0.5;

  currentStroke.push({ x: pos.x, y: pos.y, w: poolW });
  lastX = pos.x; lastY = pos.y; lastT = now;
  redrawAll();
}

function endDraw(e) {
  if (!isDrawing) return;
  clearTimeout(poolTimer);
  isDrawing = false;
  if (currentStroke.length > 1) {
    // Taper end of stroke — thin wire-like ending
    const last = currentStroke[currentStroke.length - 1];
    // Add several taper points for smooth wire-pull effect
    for (let t = 0.7; t >= 0.05; t -= 0.2) {
      currentStroke.push({ x: last.x + (Math.random()-0.5)*2, y: last.y + (Math.random()-0.5)*2, w: Math.max(0.3, last.w * t) });
    }
    strokes.push({ pts: applyTurbulence(currentStroke) });
    currentStroke = [];
    redrawAll();
    // Auto-generate 3D after 600ms
    clearTimeout(autoGenTimer);
    autoGenTimer = setTimeout(build3D, 600);
  }
}

drawCanvas.addEventListener('mousedown', e => { drawMode === 'pen' ? penDown(e) : startDraw(e); });
drawCanvas.addEventListener('mousemove', e => { drawMode === 'pen' ? penMove(e) : moveDraw(e); });
drawCanvas.addEventListener('mouseup',   e => { drawMode === 'pen' ? penUp(e)   : endDraw(e); });
drawCanvas.addEventListener('mouseleave', e => { if (drawMode !== 'pen') endDraw(e); });
drawCanvas.addEventListener('dblclick',  e => { if (drawMode === 'pen') penCommit(); });
drawCanvas.addEventListener('touchstart', e => { drawMode === 'pen' ? penDown(e) : startDraw(e); }, { passive: false });
drawCanvas.addEventListener('touchmove',  e => { drawMode === 'pen' ? penMove(e) : moveDraw(e); }, { passive: false });
drawCanvas.addEventListener('touchend',   e => { drawMode === 'pen' ? penUp(e)   : endDraw(e); });

// ─── PEN (BEZIER) MODE ───────────────────────────────────────────────────────
function penDown(e) {
  e.preventDefault();
  const pos = getPos(e);
  const bs = parseFloat(document.getElementById('brush-size').value);

  // Check if clicking near existing anchor, w-handle, or control point
  for (let i = 0; i < penAnchors.length; i++) {
    const a = penAnchors[i];
    // W handle: circle to the right of anchor
    const wx = a.x + 14, wy = a.y;
    if (Math.hypot(pos.x - wx, pos.y - wy) < 8) {
      penDragging = { type: 'w', idx: i, startY: pos.y, startW: a.w };
      return;
    }
    if (Math.hypot(pos.x - a.x, pos.y - a.y) < 10) {
      penDragging = { type: 'anchor', idx: i };
      return;
    }
    if (a.cpOut && Math.hypot(pos.x - a.cpOut.x, pos.y - a.cpOut.y) < 8) {
      penDragging = { type: 'cp', idx: i, which: 'out' };
      return;
    }
    if (a.cpIn && Math.hypot(pos.x - a.cpIn.x, pos.y - a.cpIn.y) < 8) {
      penDragging = { type: 'cp', idx: i, which: 'in' };
      return;
    }
  }

  // New anchor point
  penAnchors.push({ x: pos.x, y: pos.y, w: bs, cpIn: null, cpOut: null });
  penDragging = { type: 'cp', idx: penAnchors.length - 1, which: 'out' };
  redrawAll();
}

function penMove(e) {
  e.preventDefault();
  const pos = getPos(e);
  penPreview = pos;

  if (penDragging) {
    const a = penAnchors[penDragging.idx];
    if (penDragging.type === 'w') {
      // Drag up = bigger, down = smaller
      const dy = penDragging.startY - pos.y;
      const bs = parseFloat(document.getElementById('brush-size').value);
      a.w = Math.max(1, Math.min(bs * 15, penDragging.startW + dy * 0.4));
    } else if (penDragging.type === 'anchor') {
      const dx = pos.x - a.x, dy = pos.y - a.y;
      a.x = pos.x; a.y = pos.y;
      if (a.cpIn)  { a.cpIn.x  += dx; a.cpIn.y  += dy; }
      if (a.cpOut) { a.cpOut.x += dx; a.cpOut.y += dy; }
    } else {
      const which = penDragging.which;
      a[which === 'out' ? 'cpOut' : 'cpIn'] = { x: pos.x, y: pos.y };
      const other = which === 'out' ? 'cpIn' : 'cpOut';
      a[other] = { x: 2 * a.x - pos.x, y: 2 * a.y - pos.y };
    }
  }
  redrawAll();
}

function penUp(e) {
  penDragging = null;
}

function penCommit() {
  if (penAnchors.length < 2) { penAnchors = []; redrawAll(); return; }
  // Sample bezier path into stroke points
  const bs = parseFloat(document.getElementById('brush-size').value);
  const pts = [];
  for (let i = 0; i < penAnchors.length - 1; i++) {
    const a = penAnchors[i], b = penAnchors[i + 1];
    const cp1 = a.cpOut || a;
    const cp2 = b.cpIn  || b;
    const steps = 40;
    for (let t = 0; t <= 1; t += 1 / steps) {
      const mt = 1 - t;
      const x = mt*mt*mt*a.x + 3*mt*mt*t*cp1.x + 3*mt*t*t*cp2.x + t*t*t*b.x;
      const y = mt*mt*mt*a.y + 3*mt*mt*t*cp1.y + 3*mt*t*t*cp2.y + t*t*t*b.y;
      pts.push({ x, y, w: bs });
    }
  }
  strokes.push({ pts: applyTurbulence(pts) });
  penAnchors = [];
  penPreview = null;
  redrawAll();
  clearTimeout(autoGenTimer);
  autoGenTimer = setTimeout(build3D, 600);
}

function drawPenOverlay() {
  if (!penAnchors.length) return;
  dc.save();
  // Draw bezier path preview
  if (penAnchors.length > 1) {
    dc.beginPath();
    dc.strokeStyle = 'rgba(100,180,255,0.7)';
    dc.lineWidth = 1.5;
    dc.setLineDash([4, 3]);
    dc.moveTo(penAnchors[0].x, penAnchors[0].y);
    for (let i = 0; i < penAnchors.length - 1; i++) {
      const a = penAnchors[i], b = penAnchors[i+1];
      dc.bezierCurveTo(
        a.cpOut ? a.cpOut.x : a.x, a.cpOut ? a.cpOut.y : a.y,
        b.cpIn  ? b.cpIn.x  : b.x, b.cpIn  ? b.cpIn.y  : b.y,
        b.x, b.y
      );
    }
    dc.stroke();
    dc.setLineDash([]);
  }
  // Preview segment to mouse
  if (penPreview && penAnchors.length > 0) {
    const last = penAnchors[penAnchors.length - 1];
    dc.beginPath();
    dc.strokeStyle = 'rgba(100,180,255,0.3)';
    dc.lineWidth = 1;
    dc.setLineDash([2, 4]);
    dc.moveTo(last.x, last.y);
    dc.lineTo(penPreview.x, penPreview.y);
    dc.stroke();
    dc.setLineDash([]);
  }
  // Draw anchors and control points
  for (const a of penAnchors) {
    // Control point handles
    dc.strokeStyle = 'rgba(100,180,255,0.5)';
    dc.lineWidth = 1;
    if (a.cpOut) {
      dc.beginPath(); dc.moveTo(a.x, a.y); dc.lineTo(a.cpOut.x, a.cpOut.y); dc.stroke();
      dc.fillStyle = 'rgba(100,180,255,0.8)';
      dc.beginPath(); dc.arc(a.cpOut.x, a.cpOut.y, 4, 0, Math.PI*2); dc.fill();
    }
    if (a.cpIn) {
      dc.beginPath(); dc.moveTo(a.x, a.y); dc.lineTo(a.cpIn.x, a.cpIn.y); dc.stroke();
      dc.fillStyle = 'rgba(100,180,255,0.5)';
      dc.beginPath(); dc.arc(a.cpIn.x, a.cpIn.y, 4, 0, Math.PI*2); dc.fill();
    }
    // Anchor square
    dc.fillStyle = '#fff';
    dc.strokeStyle = '#4ab4ff';
    dc.lineWidth = 1.5;
    dc.beginPath(); dc.rect(a.x - 5, a.y - 5, 10, 10); dc.fill(); dc.stroke();
    // W handle: orange circle, size shows current w
    const wRadius = Math.max(3, Math.min(12, a.w * 0.18));
    dc.fillStyle = 'rgba(255,160,60,0.9)';
    dc.strokeStyle = 'rgba(255,120,20,0.8)';
    dc.lineWidth = 1.5;
    dc.beginPath(); dc.arc(a.x + 14, a.y, wRadius, 0, Math.PI * 2); dc.fill(); dc.stroke();
  }
  dc.restore();
}

// ─── THREE.JS SETUP ───────────────────────────────────────────────────────────
const threeCanvas = document.getElementById('three-canvas');
const rightEl = document.getElementById('right');

const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0d0d0d');

// 3D grid helper (floor)
const gridHelper = new THREE.GridHelper(6, 12, 0x333333, 0x222222);
gridHelper.visible = true;
scene.add(gridHelper);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
camera.position.set(0, 2, 5);

const controls = new OrbitControls(camera, threeCanvas);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;

// Environment
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// Post-processing
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(new THREE.Vector2(800, 600), 0.05, 0.4, 0.7);
bloomPass.enabled = false;
composer.addPass(bloomPass);

const outputPass = new OutputPass();
composer.addPass(outputPass);

function resizeThree() {
  const w = rightEl.clientWidth, h = rightEl.clientHeight;
  if (!w || !h) return;
  renderer.setSize(w, h);
  composer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  bloomPass.resolution.set(w, h);
}

// ─── 3D BUILD ─────────────────────────────────────────────────────────────────
let sculpture = null;

// Build flat oval tube: custom ellipse cross-section via FrenetFrames
// Voxel sphere approach: place spheres along path, overlapping = organic blob feel
// MarchingCubes metaball: all strokes fused into one organic mesh
let mcEffect = null;

function buildMarchingCubes(allStrokes, scale, mat, smoothIdx) {
  const resolution = [28, 48, 72, 96, 128, 192][smoothIdx];
  if (mcEffect) {
    mcEffect.parent && mcEffect.parent.remove(mcEffect);
    mcEffect.dispose && mcEffect.dispose();
  }
  mcEffect = new MarchingCubes(resolution, mat, true, true, 500000);
  mcEffect.isolation = 80;

  // Collect all blob positions from all strokes
  for (const stroke of allStrokes) {
    const pts = stroke.pts;
    if (pts.length < 2) continue;
    const curve = new THREE.CatmullRomCurve3(
      pts.map(p => new THREE.Vector3(
        (p.x - 512) / 512,
        -(p.y - 512) / 512,
        0
      ))
    );
    const subdivide = [40, 80, 160, 320, 480, 640][smoothIdx];
    const smoothPts = curve.getPoints(subdivide);
    const smoothWidths = smoothPts.map((_, si) => {
      const t = si / subdivide;
      const srcIdx = Math.min(Math.floor(t * (pts.length - 1)), pts.length - 2);
      const frac = t * (pts.length - 1) - srcIdx;
      return pts[srcIdx].w * (1 - frac) + pts[srcIdx + 1].w * frac;
    });

    for (let i = 0; i < smoothPts.length; i++) {
      const p = smoothPts[i];
      const w = Math.max(0.01, smoothWidths[i] * scale * 1.2);
      // MarchingCubes coords are in [-1,1]; map world coords to that space
      const x = (p.x + 1) / 2;
      const y = (p.y + 1) / 2;
      const z = (p.z + 1) / 2;
      if (x < 0 || x > 1 || y < 0 || y > 1 || z < 0 || z > 1) continue;
      mcEffect.addBall(x, y, z, w, 12);
    }
  }

  return mcEffect;
}

function build3D(forceResolution) {
  document.getElementById('hint').style.display = 'none';

  // Clear old sculpture
  if (sculpture) {
    scene.remove(sculpture);
    sculpture.traverse(c => { c.geometry?.dispose(); c.material?.dispose(); });
    sculpture = null;
  }
  if (mcEffect) { mcEffect.parent && mcEffect.parent.remove(mcEffect); mcEffect = null; }
  if (!strokes.length) return;

  const color = new THREE.Color(document.getElementById('stroke-color').value);
  const smoothIdx = parseInt(document.getElementById('smooth').value);
  const zSpread = parseFloat(document.getElementById('z-spread').value) / 100 * 3.0;
  const cw = drawCanvas.width, ch = drawCanvas.height;
  const scale = parseFloat(document.getElementById('tube-radius').value) / 1000;

  const matParams = {
    chrome: { metalness: 1.0, roughness: 0.0,  envMapIntensity: 2.0 },
    matte:  { metalness: 0.0, roughness: 0.85, envMapIntensity: 0.3 },
    gold:   { metalness: 1.0, roughness: 0.15, envMapIntensity: 1.5 },
  }[currentMat] || { metalness: 0.9, roughness: 0.1 };
  const mat = new THREE.MeshStandardMaterial({ color, ...matParams });

  const resolution = forceResolution || [28, 48, 72, 96, 128, 192][smoothIdx];
  mcEffect = new MarchingCubes(resolution, mat, true, true, 500000);
  mcEffect.isolation = 80;

  // Build symmetry copies
  const symCopies = [];
  if (symmetry === 'free') {
    symCopies.push({ angle: 0, mirror: false });
  } else if (symmetry === 'mirror') {
    symCopies.push({ angle: 0, mirror: false });
    symCopies.push({ angle: 0, mirror: true });
  } else {
    const n = parseInt(symmetry);
    for (let i = 0; i < n; i++) symCopies.push({ angle: (Math.PI * 2 * i) / n, mirror: false });
  }

  const subdivide = [40, 80, 160, 320, 480, 640][smoothIdx];

  for (const stroke of strokes) {
    const pts = stroke.pts;
    if (pts.length < 2) continue;

    const rawPts = pts.map((p, i) => {
      const t = pts.length > 1 ? i / (pts.length - 1) : 0;
      const zCurve = Math.sin(t * Math.PI) * zSpread;
      return new THREE.Vector3((p.x - cw/2) / cw, -(p.y - ch/2) / ch, zCurve * 0.3);
    });

    for (const copy of symCopies) {
      const basePts = copy.mirror ? rawPts.map(p => new THREE.Vector3(-p.x, p.y, p.z)) : rawPts;
      const curve = new THREE.CatmullRomCurve3(basePts);
      const smoothPts = curve.getPoints(subdivide);
      const smoothWidths = smoothPts.map((_, si) => {
        const t = si / subdivide;
        const srcIdx = Math.min(Math.floor(t * (pts.length - 1)), pts.length - 2);
        const frac = t * (pts.length - 1) - srcIdx;
        return pts[srcIdx].w * (1 - frac) + pts[srcIdx + 1].w * frac;
      });

      const strengthMult = parseFloat(document.getElementById('strength').value) / 100;
      for (let i = 0; i < smoothPts.length; i++) {
        let px = smoothPts[i].x, py = smoothPts[i].y, pz = smoothPts[i].z;
        // Rotate in [-0.5,0.5] space around origin (canvas center)
        if (copy.angle !== 0) {
          const cos = Math.cos(copy.angle), sin = Math.sin(copy.angle);
          const rx = px * cos - py * sin;
          const ry = px * sin + py * cos;
          px = rx; py = ry;
        }
        // Map to [0,1] for MarchingCubes
        const x = px + 0.5, y = py + 0.5, z = pz + 0.5;
        if (x < 0.02 || x > 0.98 || y < 0.02 || y > 0.98 || z < 0.02 || z > 0.98) continue;
        const strength = Math.max(0.005, smoothWidths[i] * scale * strengthMult);
        mcEffect.addBall(x, y, z, strength, 12);
      }
    }
  }

  console.log('MarchingCubes: added blobs, calling update()');
  mcEffect.update();

  sculpture = mcEffect;
  scene.add(sculpture);

  // Frame camera to fit sculpture
  const bbox = new THREE.Box3().setFromObject(sculpture);
  const sphere = new THREE.Sphere();
  bbox.getBoundingSphere(sphere);
  controls.target.copy(sphere.center);
  camera.position.copy(sphere.center).addScaledVector(new THREE.Vector3(0.5, 0.8, 1).normalize(), sphere.radius * 3.5);
  camera.updateProjectionMatrix();
  controls.update();
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  if (bloomPass.enabled) {
    composer.render();
  } else {
    renderer.render(scene, camera);
  }
}
animate();

// ─── CONTROLS ────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-sym]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-sym]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = btn.dataset.sym;
    symmetry = (v === 'free' || v === 'mirror') ? v : parseInt(v);
    redrawAll();
    // Auto-rebuild 3D when symmetry changes
    if (strokes.length) {
      clearTimeout(autoGenTimer);
      autoGenTimer = setTimeout(build3D, 300);
    }
  });
});

document.getElementById('btn-clear').addEventListener('click', () => {
  strokes = []; currentStroke = []; penAnchors = []; penPreview = null;
  dc.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  if (sculpture) { scene.remove(sculpture); sculpture = null; }
  document.getElementById('hint').style.display = '';
});

document.getElementById('mode-brush').addEventListener('change', () => { drawMode = 'brush'; penAnchors = []; penPreview = null; redrawAll(); });
document.getElementById('mode-pen').addEventListener('change', () => { drawMode = 'pen'; });

// Pen: Enter key commits path
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && drawMode === 'pen') penCommit();
  if (e.key === 'Escape' && drawMode === 'pen') { penAnchors = []; penPreview = null; redrawAll(); }
});

document.getElementById('btn-generate').addEventListener('click', build3D);
document.getElementById('btn-render').addEventListener('click', () => {
  const btn = document.getElementById('btn-render');
  btn.textContent = 'Rendering...';
  btn.disabled = true;
  setTimeout(() => {
    build3D(96);
    btn.textContent = 'Render HD';
    btn.disabled = false;
  }, 50);
});

document.getElementById('bloom-toggle').addEventListener('change', e => {
  bloomPass.enabled = e.target.checked;
});

document.getElementById('grid-toggle').addEventListener('change', e => {
  gridHelper.visible = e.target.checked;
  redrawAll();
});

document.getElementById('bright-toggle').addEventListener('change', e => {
  const bright = e.target.checked;
  const bg = bright ? '#e8e4de' : '#111111';
  const panelBg = bright ? 'rgba(232,228,222,0.96)' : '';
  const textColor = bright ? '#222' : '';
  scene.background = new THREE.Color(bright ? '#eae6e0' : '#0d0d0d');
  // Update canvas background
  drawCanvas.style.background = bright ? '#f0ede8' : '#000';
  dc.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  redrawAll();
  document.body.style.background = bg;
  document.body.style.color = textColor;
  document.querySelectorAll('*').forEach(el => {
    if (el.classList.contains('panel') || el.id === 'left-panel' || el.id === 'right-panel' || el.id === 'controls-row' || el.id === 'top-bar') {
      el.style.background = panelBg;
      el.style.color = textColor;
    }
  });
  // Grid color
  gridHelper.children && gridHelper.children.forEach(c => {
    if (c.material) c.material.color.set(bright ? 0xaaaaaa : 0x333333);
  });
});

// Material buttons
document.querySelectorAll('.mat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMat = btn.dataset.mat;
    // Chrome: auto bloom on + high exposure; Matte: bloom off
    if (currentMat === 'chrome') {
      bloomPass.enabled = true;
      document.getElementById('bloom-toggle').checked = true;
      renderer.toneMappingExposure = 1.5;
    } else if (currentMat === 'matte') {
      bloomPass.enabled = true;
      document.getElementById('bloom-toggle').checked = false;
      renderer.toneMappingExposure = 1.0;
    } else {
      bloomPass.enabled = true;
      document.getElementById('bloom-toggle').checked = true;
      renderer.toneMappingExposure = 1.2;
    }
    if (sculpture) build3D(); // rebuild with new material
  });
});

// Slider bindings
function bindSlider(id, valId, factor, digits) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    vl.textContent = factor ? (v * factor).toFixed(digits) : v;
  });
}
bindSlider('brush-size', 'brush-val', 0, 0);
bindSlider('turbulence', 'turb-val', 0, 0);
bindSlider('tube-radius', 'tube-val', 0.001, 3);

// Z-spread: show value and auto-rebuild on change
document.getElementById('z-spread').addEventListener('input', e => {
  document.getElementById('z-val').textContent = e.target.value;
  if (strokes.length) {
    clearTimeout(autoGenTimer);
    autoGenTimer = setTimeout(build3D, 200);
  }
});

// Smooth: show label and auto-rebuild
document.getElementById('smooth').addEventListener('input', e => {
  const labels = ['Low', 'Med', 'High', 'Ultra', 'Max', 'Max+'];
  document.getElementById('smooth-val').textContent = labels[e.target.value];
  if (strokes.length) {
    clearTimeout(autoGenTimer);
    autoGenTimer = setTimeout(build3D, 200);
  }
});

document.getElementById('strength').addEventListener('input', e => {
  const v = (e.target.value / 100).toFixed(2);
  document.getElementById('strength-val').textContent = v;
  if (strokes.length) {
    clearTimeout(autoGenTimer);
    autoGenTimer = setTimeout(build3D, 200);
  }
});

// Export PNG
document.getElementById('btn-export').addEventListener('click', () => {
  renderer.render(scene, camera);
  threeCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'inkit.png';
    a.click();
    URL.revokeObjectURL(a.href);
  });
});

// Export GLB
document.getElementById('btn-export-glb').addEventListener('click', async () => {
  if (!sculpture) return;
  const { GLTFExporter } = await import('three/addons/exporters/GLTFExporter.js');
  const exporter = new GLTFExporter();
  exporter.parse(sculpture, glb => {
    const blob = new Blob([glb], { type: 'application/octet-stream' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'inkit.glb';
    a.click();
    URL.revokeObjectURL(a.href);
  }, err => console.error(err), { binary: true });
});

// Reference image (background overlay on draw canvas)
let refImg = null;
document.getElementById('ref-img-toggle').addEventListener('change', e => {
  if (e.target.checked) {
    document.getElementById('ref-img-input').click();
  } else {
    refImg = null;
    redrawAll();
  }
});
document.getElementById('ref-img-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => { refImg = img; redrawAll(); };
  img.src = URL.createObjectURL(file);
});

// Grain normalMap
function makeGrainTexture() {
  const size = 256;
  const data = new Uint8Array(size * size * 3);
  for (let i = 0; i < data.length; i += 3) {
    const v = 128 + (Math.random() - 0.5) * 60;
    data[i] = v; data[i+1] = v; data[i+2] = 255; // mostly Z-facing normal
  }
  const tex = new THREE.DataTexture(data, size, size, THREE.RGBFormat);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(8, 8);
  tex.needsUpdate = true;
  return tex;
}
const grainTex = makeGrainTexture();

document.getElementById('grain-toggle').addEventListener('change', e => {
  if (!sculpture?.material) return;
  sculpture.material.normalMap = e.target.checked ? grainTex : null;
  sculpture.material.normalScale.set(0.3, 0.3);
  sculpture.material.needsUpdate = true;
});

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function onResize() {
  resizeDrawCanvas();
  resizeThree();
}
window.addEventListener('resize', onResize);

// Init
requestAnimationFrame(() => {
  onResize();
});
</script>
